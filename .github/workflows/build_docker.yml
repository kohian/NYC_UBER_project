name: Build and Push Docker Image

on: 
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker_build_push:
    # needs: docker_lint_test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for WIF

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/560688837693/locations/global/workloadIdentityPools/github-actions/providers/github-google
          service_account: github-action-push-to-artifact@nyc-uber-494107.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: nyc-uber-494107

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/nyc-uber-494107/docker-artifacts/nyc-forecast:${{ github.sha }}
            us-central1-docker.pkg.dev/nyc-uber-494107/docker-artifacts/nyc-forecast:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max